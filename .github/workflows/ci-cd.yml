name: ✨ hyperbliss.tech CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: 🔮 Validate & Build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v6

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔒 Security audit
        run: pnpm audit --prod

      - name: 🎨 Format & Lint
        run: pnpm run ci

      - name: 🧪 Run tests
        run: pnpm test

      - name: 🏗️ Build
        run: pnpm build
