overrides:
  "postcss@<8.5.10": ">=8.5.10"
  "sharp@<0.35.0": ">=0.35.0 <0.36"
  "@hono/node-server@<2.0.5": ">=2.0.5 <3"

allowBuilds:
  # just-bash's optional Node compression backends — we only ship its browser
  # bundle, which doesn't use them, so skip building the native modules.
  "@mongodb-js/zstd": false
  esbuild: true
  node-liblzma: false
  sharp: true

minimumReleaseAgeExclude:
  - "@vitejs/plugin-react@6.0.4"
