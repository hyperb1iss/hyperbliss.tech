# Explicit typecheck kept as defense-in-depth while we ride the Next 16.3
# canary for TypeScript 7 support (useTypeScriptCli) — the in-build check is
# active again, but a deploy-blocking gate that doesn't depend on Next's TS
# integration has already saved us once.
[build]
command = "pnpm typecheck && pnpm build"
publish = ".next"

[[plugins]]
package = "@netlify/plugin-nextjs"

[build.environment]
NEXT_PUBLIC_APP_URL = "https://hyperb1iss.netlify.app"
NODE_VERSION = "24"
NEXT_TELEMETRY_DISABLED = "1"
SECRETS_SCAN_OMIT_PATHS = ".next/server/**,.netlify/**"

[[redirects]]
from = "/blog/2026.03.01_terminal-renaissance"
to = "/blog/2026.04.04_terminal-renaissance"
status = 301
