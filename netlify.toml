# typecheck runs here because next's in-build check is disabled while
# TypeScript 7 lacks a JS API (until Next 16.3's useTypeScriptCli) — without
# it, a type-broken push would deploy while CI merely goes red.
[build]
command = "pnpm typecheck && pnpm build"
publish = ".next"

[[plugins]]
package = "@netlify/plugin-nextjs"

[build.environment]
NEXT_PUBLIC_APP_URL = "https://hyperb1iss.netlify.app"
NODE_VERSION = "24"
NEXT_TELEMETRY_DISABLED = "1"
SECRETS_SCAN_OMIT_PATHS = ".next/server/**,.netlify/**"

[[redirects]]
from = "/blog/2026.03.01_terminal-renaissance"
to = "/blog/2026.04.04_terminal-renaissance"
status = 301
